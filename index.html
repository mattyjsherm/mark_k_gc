<style>
  :root{
    --navy:#00153b; --navy2:#011d4e; --ink:#0a1024;
    --paper:#f7f4ec; --paper2:#efeadd;
    --gold:#c9a24b; --gold-soft:#e7cf95;
    --text:#1d2330; --muted:#6c7385; --line:rgba(10,16,36,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:'Hanken Grotesk',sans-serif;
    background:radial-gradient(120% 80% at 50% -10%, var(--navy2) 0%, var(--navy) 45%, var(--ink) 100%);
    color:var(--text);min-height:100vh;min-height:100dvh;display:flex;
    padding:24px 16px;overflow-x:hidden;
  }
  body::before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.5;
    background-image:radial-gradient(circle at 1px 1px, rgba(255,255,255,.04) 1px, transparent 0);background-size:4px 4px;}
  .card{position:relative;width:100%;max-width:430px;margin:auto;background:var(--paper);border-radius:22px;overflow:hidden;
    box-shadow:0 40px 90px -30px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.04);
    animation:rise .8s cubic-bezier(.2,.8,.25,1) both;}
  @keyframes rise{from{opacity:0;transform:translateY(24px) scale(.98);}to{opacity:1;transform:none;}}

  .band{position:relative;background:linear-gradient(160deg,var(--navy2),var(--ink));padding:34px 30px 30px;color:var(--paper);}
  .band::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);}
  .wmlogo{display:block;width:182px;height:auto;margin:2px auto 22px 0;animation:fade .9s .15s both;}
  .kicker{font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:var(--gold-soft);font-weight:600;animation:fade .9s .25s both;}
  .band h1{font-family:'Fraunces',serif;font-weight:500;font-size:29px;line-height:1.14;margin-top:10px;letter-spacing:-.01em;animation:fade .9s .35s both;}
  .band h1 em{font-style:italic;color:var(--gold-soft);}

  .body{padding:30px 30px 12px;}
  .note{font-family:'Fraunces',serif;font-size:16.5px;line-height:1.62;color:#2b3242;animation:fade .9s .45s both;}
  .note p{margin-bottom:14px;}
  .sign{margin-top:24px;animation:fade .9s .6s both;}
  .sign .name{font-family:'Sacramento',cursive;font-size:40px;line-height:.95;color:#0e2a55;
    display:inline-block;transform:rotate(-1.5deg) skewX(-3deg);transform-origin:left center;}
  .sign .role{font-size:12.5px;color:var(--muted);margin-top:14px;}

  .divider{display:flex;align-items:center;gap:14px;margin:26px 30px 0;animation:fade .9s .7s both;}
  .divider .ln{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--line),transparent);}
  .divider .dot{font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);}

  .gift{margin:22px 30px 30px;animation:fade .9s .8s both;}
  .gift-card{position:relative;background:linear-gradient(155deg,var(--navy2),var(--ink));border-radius:16px;padding:22px;color:var(--paper);
    border:1px solid rgba(201,162,75,.3);overflow:hidden;}
  .gift-card::before{content:"";position:absolute;top:-40%;right:-20%;width:160px;height:160px;border-radius:50%;
    background:radial-gradient(circle,rgba(201,162,75,.18),transparent 70%);}
  .gift-tag{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--gold-soft);font-weight:600;}
  .gift-name{font-family:'Fraunces',serif;font-size:24px;font-weight:500;margin-top:8px;line-height:1.15;}
  .gift-desc{font-size:13.5px;color:#c4cbdb;margin-top:9px;line-height:1.5;}

  .field{margin-top:18px;}
  .flabel{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:10px;display:block;}

  input{width:100%;font-family:inherit;font-size:15px;color:var(--text);background:var(--paper2);border:1px solid var(--line);
    border-radius:12px;padding:14px 15px;outline:none;}
  input:focus{border-color:var(--gold);background:#fff;}

  .cta{width:100%;margin-top:20px;background:linear-gradient(180deg,var(--gold-soft),var(--gold));color:var(--ink);
    border:none;border-radius:13px;padding:16px;font-family:'Hanken Grotesk',sans-serif;font-size:15px;font-weight:600;
    cursor:pointer;transition:.18s;}
  .cta:hover{filter:brightness(1.04);}
  .cta:active{transform:scale(.985);}
  .cta:disabled{opacity:.45;cursor:default;}

  .footnote{text-align:center;font-size:12px;color:var(--muted);padding:0 30px 26px;line-height:1.6;animation:fade .9s .95s both;}
  .footnote .who{color:var(--text);font-weight:600;}
  .footnote a{color:var(--navy);text-decoration:none;border-bottom:1px solid var(--gold);padding-bottom:1px;}

  .confirm{padding:46px 32px 40px;text-align:center;}
  .seal{width:74px;height:74px;border-radius:50%;background:linear-gradient(155deg,var(--navy2),var(--ink));
    border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;margin:0 auto 22px;
    animation:pop .55s cubic-bezier(.2,.8,.3,1.5) both;}
  .seal svg{width:32px;height:32px;stroke:var(--gold-soft);}
  @keyframes pop{from{transform:scale(0) rotate(-20deg);}to{transform:scale(1) rotate(0);}}
  .confirm h2{font-family:'Fraunces',serif;font-weight:500;font-size:25px;color:var(--navy);}
  .confirm p{font-size:14.5px;color:var(--muted);margin-top:12px;line-height:1.6;}
  .confirm .detail{margin-top:20px;background:var(--paper2);border:1px solid var(--line);border-radius:13px;padding:15px 18px;
    font-size:14px;color:var(--text);line-height:1.6;text-align:left;}
  .confirm .detail b{font-weight:600;}
  .confirm .contact{margin-top:18px;font-size:12.5px;color:var(--muted);line-height:1.6;}
  .confirm .contact .who{color:var(--text);font-weight:600;}
  .confirm .contact a{color:var(--navy);text-decoration:none;border-bottom:1px solid var(--gold);}
  .processing{display:inline-flex;align-items:center;gap:9px;color:var(--muted);font-size:13px;margin-top:18px;}
  .spinner{width:15px;height:15px;border:2px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
</style>
</head>

/* ============================================================================
   ALERT ENDPOINT — Formspree (or Zapier/Make) URL.
   You are emailed ONLY on a real submission ("redeemed"), so you get the
   recipient's chosen inbox and can buy + send the right e-gift card straight away.
   Flip EMAIL_ON_OPEN to true if you also want a ping when the page is opened.
============================================================================ */
const ALERT_ENDPOINT = "https://formspree.io/f/xaqzbzoo";
const EMAIL_ON_OPEN  = false;

/* ---- recipient ---- */
const R = {
  name:"Kelly",
  kicker:"With congratulations",
  headline:"Among Kelowna's top advisors, <em>Kelly.</em>",
  note:[
    "Congratulations on a standout showing at this year's Best of Kelowna Awards — top-three recognition across the wealth and finance advisor categories, from Wealth Advisor to Financial Advisor, Investment Advisor, and Certified Financial Planner. Placing among the best in several categories, not just one, speaks to the trust your clients place in you and the standard you set across this community.",
    "It also didn't go unnoticed that every medalist on this year's Kelowna wealth list was a woman — a genuine milestone, and a credit to advisors like you who are changing what this profession looks like for the women and students watching.",
    "As a congratulations, dinner is on us — an e-gift card to Roma Nord in Kelowna. Just tell us where to send it below and it'll land in your inbox shortly."
  ]
};

/* ---- pre-selected gift ---- */
const RESTAURANT = {
  name:"Roma Nord",
  desc:"An e-gift card for dinner at Roma Nord Bistro — authentic Roman cooking in Kelowna's Cultural District."
};

/* ---- sender (branch manager) ---- */
const MANAGER = {
  signature:"Mark Kinnear",
  title:"Senior Branch Manager & Investment Advisor",
  firm:"RBC Dominion Securities",
  email:"mark.kinnear@rbc.com",
  phone:"250-712-2110"
};

/* ---- for the alert only ---- */
const AWARD = "Top 3 — Best of Kelowna wealth & finance categories";

/* ============================================================================ */

function notify(event, payload){
  payload = payload || {};
  const data = {
    _subject: event === "redeemed"
      ? `🍽️ Dinner card requested — ${RESTAURANT.name} for ${R.name}`
      : `Dinner page ${event} — ${R.name}`,
    event,
    recipient: R.name,
    award: AWARD,
    restaurant: RESTAURANT.name,
    send_card_to: payload.send_to || "",
    sender: MANAGER.signature,
    time: new Date().toLocaleString()
  };
  console.log("[ALERT]", data);
  if(!ALERT_ENDPOINT) return Promise.resolve();
  if(event !== "redeemed" && !EMAIL_ON_OPEN) return Promise.resolve();
  return fetch(ALERT_ENDPOINT, {
    method:"POST",
    headers:{ "Content-Type":"application/json", "Accept":"application/json" },
    body:JSON.stringify(data)
  }).catch(()=>{});
}

const card = document.getElementById("card");
notify("opened");

      <div class="kicker">${esc(R.kicker)}</div>
      <h1>${R.headline}</h1>
    </div>

      <div class="note">${R.note.map(p=>`<p>${p}</p>`).join("")}</div>
      <div class="sign">
        <div class="name">${esc(MANAGER.signature)}</div>
        <div class="role">${esc(MANAGER.title)}<br>${esc(MANAGER.firm)}</div>
      </div>
    </div>
    <div class="divider"><span class="ln"></span><span class="dot">your gift</span><span class="ln"></span></div>
    <div class="gift">
      <div class="gift-card">
        <div class="gift-tag">Dinner, on us</div>
        <div class="gift-name">${esc(RESTAURANT.name)}</div>

      </div>

      <div class="field">
        <label class="flabel" for="email">Where should we send your e-card?</label>
        <input type="email" id="email" placeholder="you@email.com" />
      </div>

      <button class="cta" id="send">Send my dinner card</button>
    </div>
    <div class="footnote">
      And if you're ever open to a conversation — about your work, the industry, or simply what's next.<br>
      To learn more, <a href="https://wmc.rbcwealthmanagement.com/advisor-talent-recruiting/home" target="_blank" rel="noopener">click here</a>.<br><br>
      <span class="who">${esc(MANAGER.signature)}</span> · ${esc(MANAGER.firm)}<br>
      ${esc(MANAGER.email)} · ${esc(MANAGER.phone)}
    </div>`;

  card.querySelector("#send").addEventListener("click", submit);
}

function submit(){
  const email = (card.querySelector("#email")||{}).value || "";
  if(!validEmail(email)){ flash("#email"); return; }

  notify("redeemed", { send_to: email });

  card.innerHTML = `
    <div class="confirm">
      <div class="seal"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div>
      <h2>Your dinner is on its way.</h2>
      <p>We're sending your e-gift card now.</p>
      <div class="detail">
        <b>${esc(RESTAURANT.name)}</b><br>
        <b>Sending to:</b> ${esc(email)}
      </div>
      <div class="contact">
        And truly — if you're ever up for a chat about the work or what's ahead, I'd love to connect.<br>
        To learn more, <a href="https://wmc.rbcwealthmanagement.com/advisor-talent-recruiting/home" target="_blank" rel="noopener">click here</a>.<br>
        <span class="who">${esc(MANAGER.signature)}</span> · ${esc(MANAGER.firm)}<br>
        ${esc(MANAGER.email)} · ${esc(MANAGER.phone)}
      </div>
      <div class="processing" id="proc"><span class="spinner"></span> Preparing your e-card…</div>
    </div>`;
  setTimeout(()=>{
    const proc = card.querySelector("#proc");
    if(proc) proc.innerHTML = `<span style="color:var(--gold)">✓</span> <span style="color:var(--text)">Sent — check your inbox shortly. Enjoy dinner.</span>`;
  }, 2600);
}

function validEmail(e){ return /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(e); }
function flash(sel){ const el=card.querySelector(sel); if(!el) return; el.style.borderColor="#c0392b"; el.focus(); setTimeout(()=>el.style.borderColor="",1200); }

render();
</script>
</body>
